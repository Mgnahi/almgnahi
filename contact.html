<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a href="index.html">
    <button id="button4"><span>&#8592;</span></button>
  </a>

  <main class="contact-wrap">
    <h1 class="contact-title">Contact Me</h1>

    <p class="contact-subtitle">
      Feel free to reach me over
      <a class="contact-link" 
      href="https://www.linkedin.com/in/laith-al-mgnahi-aa6a05383?utm_source=share_via&utm_content=profile&utm_medium=member_android" 
      target="_blank">LinkedIn</a>
      or send me a message below!
    </p>

    <form id="contactForm" class="contact-form"
          action="https://formspree.io/f/xykdrdpg"
          method="POST">

      <input class="contact-input" type="text" name="name" placeholder="Name" required>
      <input class="contact-input" type="email" name="email" placeholder="Email" required>
      <textarea class="contact-textarea" name="message" placeholder="Message" rows="7" required></textarea>

      <button id="sendBtn" class="contact-btn" type="submit">Send Message</button>

      <!-- Status message area -->
      <p id="formStatus" class="form-status"></p>
    </form>
  </main>

  <script src="contact.js"></script>
</body>

</html>
